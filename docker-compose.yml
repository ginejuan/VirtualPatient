version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: uca_user
      POSTGRES_PASSWORD: uca_password_123
      POSTGRES_DB: virtualpatient
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  backend:
    build: 
      context: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://uca_user:uca_password_123@db:5432/virtualpatient
      - JWT_SECRET=super_secret_production_key_12345
      - GROQ_API_KEY=${GROQ_API_KEY} # Debes inyectarlo en Dokploy
      - GOOGLE_API_KEY=${GOOGLE_API_KEY} # Debes inyectarlo en Dokploy
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - ELEVENLABS_SYSTEM_VOICE_ID=${ELEVENLABS_SYSTEM_VOICE_ID}
    depends_on:
      - db
    volumes:
      - chroma_data:/app/chroma_db
    networks:
      - dokploy-network

  frontend:
    build: 
      context: ./frontend
    restart: always
    depends_on:
      - backend
    networks:
      - dokploy-network

volumes:
  postgres_data:
  chroma_data:

networks:
  dokploy-network:
    external: true
